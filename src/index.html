<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&family=Righteous&display=swap" rel="stylesheet">
    <link rel="icon" href="./assets/img/4geeks.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Domain Generator Adrian V2</title>
    <script src="https://kit.fontawesome.com/8ade12ddaa.js" crossorigin="anonymous"></script>
  </head>
  <body>
    <!-- Write your HTML code here, you can delete everything withing the body tags -->
    <div class="container-fluid h-100 d-flex align-items-center justify-content-center flex-column">
      <div class="row d-flex align-items-center justify-content-center">
        <div class="col-12">
          <div class="text-center">
            <h1>Generador de nombres de dominio</h1>
            <h2>Encuentra el dominio perfecto para ti sin tener pensar</h2>
          </div>
          <div class="input input-group mb-3 d-flex align-items-center flex-column mt-5">
            <input type="text" class="form-control w-75 text-center" id="word" placeholder="Escribe una palabra (ej. delicio) y veras la magia" aria-label="Recipient’s username" aria-describedby="button-addon2">
            <button class="btn btn-outline-secondary w-75" type="button" id="button-addon2" onclick="genDomain()">Generar</button>
          </div>
        </div>
      </div>

      <div id="result"></div>

    </div>

    <!-- Do not delete this script tag, this is what connects your HTML with the Javascript code -->
    <script type="module" src="/app.js"></script>
  </body>
</html>
